<VirtualHost *:80>
  ServerName localhost

  DocumentRoot /www/view
  Alias /data /www/data
  Alias /core /www/core

  <Directory /www/>
      Options FollowSymLinks
      AllowOverride All
      Require all granted
  </Directory>

  RewriteEngine On
  RewriteOptions inherit
  LogLevel error

</VirtualHost>

